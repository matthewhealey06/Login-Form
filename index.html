<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="wrapper" id="form">
        <h1>Login</h1>

        <div class="input-field">
            <div class="inp-wrapper">
                <input type="text" id="username" placeholder="Username" required>
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    fill="white" viewBox="0 0 24 24" >
                    <path d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"></path>
                </svg>
            </div>
            <div class="inp-wrapper">
                <input type="password" id="password" placeholder="Password" required>
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    fill="white" viewBox="0 0 24 24" >
                    <path d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"></path>
                </svg>
            </div>
        </div>

        <div class="remember-forgot">
            <label><input id="rememberMe" type="checkbox"> Remember Me</label>
            <a href="#">Forgot Password?</a>
        </div>
        <p id="error-message" style="color: red; margin: 0; padding: 0; padding-bottom: 15px;"></p>
        <button id="submit">Login</button>

        <div class="register">
            <p>Dont have an account?</p>
            <a href="register.html">Register</a>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
